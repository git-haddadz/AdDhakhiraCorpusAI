services:
  addhakhira-ai-dev:
    build:
      context: .
      dockerfile: Dockerfile
      network: host
    image: addhakhira-ai:latest
    working_dir: /workspace/AdDhakhiraCorpusAI
    volumes:
      - .:/workspace/AdDhakhiraCorpusAI
      - ./models:/workspace/AdDhakhiraCorpusAI/models
      - ./outputs:/workspace/AdDhakhiraCorpusAI/outputs
      - ./database/vector_indexes:/workspace/AdDhakhiraCorpusAI/database/vector_indexes
    environment:
      HF_TOKEN: ${HF_TOKEN:-}
      HF_HOME: /workspace/AdDhakhiraCorpusAI/.cache/huggingface
      TRANSFORMERS_CACHE: /workspace/AdDhakhiraCorpusAI/.cache/huggingface/transformers
      SENTENCE_TRANSFORMERS_HOME: /workspace/AdDhakhiraCorpusAI/.cache/sentence_transformers
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
    gpus: all
    network_mode: host
    ipc: host
    shm_size: "32gb"
    stdin_open: true
    tty: true
    command: bash
